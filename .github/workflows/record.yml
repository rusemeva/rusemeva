name: orvella-vault

# re-index trigger 2026-07-15
permissions:
  contents: write

on:
  repository_dispatch:
    types: [record-request]
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: 'Direct .m3u8 URL'
        required: true
      duration:
        description: 'Duration in seconds (default 300)'
        required: false
        default: '300'
      chat_id:
        description: 'Telegram chat ID'
        required: true
      filename:
        description: 'Output filename'
        required: false
        default: ''
      human_duration:
        description: 'Human readable duration'
        required: false
        default: ''
      simulate_over_2gb:
        description: 'DEBUG: paksa original dianggap >2GB (test skip-original + still-send-HEVC)'
        required: false
        default: 'false'

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: Asia/Jakarta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
              echo "m3u8_url=${{ github.event.client_payload.m3u8_url }}" >> $GITHUB_OUTPUT
            echo "duration=${{ github.event.client_payload.duration }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ github.event.client_payload.chat_id }}" >> $GITHUB_OUTPUT
            echo "human_duration=${{ github.event.client_payload.human_duration }}" >> $GITHUB_OUTPUT
            echo "duration_label=${{ github.event.client_payload.duration_label }}" >> $GITHUB_OUTPUT
            echo "referer=${{ github.event.client_payload.referer }}" >> $GITHUB_OUTPUT
            echo "hevc_preset=${{ github.event.client_payload.hevc_preset || 'veryfast' }}" >> $GITHUB_OUTPUT
            echo "hevc_crf=${{ github.event.client_payload.hevc_crf || '24' }}" >> $GITHUB_OUTPUT
          else
            echo "m3u8_url=${{ inputs.m3u8_url }}" >> $GITHUB_OUTPUT
            echo "duration=${{ inputs.duration }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ inputs.chat_id }}" >> $GITHUB_OUTPUT
            echo "human_duration=${{ inputs.human_duration }}" >> $GITHUB_OUTPUT
            echo "duration_label=${{ inputs.duration_label }}" >> $GITHUB_OUTPUT
            echo "referer=${{ inputs.referer }}" >> $GITHUB_OUTPUT
            echo "simulate_over_2gb=${{ inputs.simulate_over_2gb }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate filename
        id: fname
        run: |
          NOW=$(date '+%Y-%m-%d_%H-%M-%S')
          DURATION_LABEL="${{ steps.inputs.outputs.duration_label }}"
          FNAME="Orvella-Asset-${NOW}-${DURATION_LABEL}.mp4"
          echo "filename=$FNAME" >> $GITHUB_OUTPUT

      - name: Install dependencies (apt ffmpeg untuk rekam + static ffmpeg untuk HEVC)
        run: |
          # apt ffmpeg = stabil buat rekam (-c copy). Encoder libx265 di apt
          # sering tidak ada, jadi kita juga download static build khusus HEVC.
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg >/dev/null 2>&1 || true
          echo "apt ffmpeg: $(command -v ffmpeg || echo MISSING)"

          # Fallback default: pakai apt ffmpeg kalau download static gagal total,
          # supaya step ini TIDAK PERNAH menggagalkan job (rekaman tetap jalan).
          FFMPEG_STATIC="$(command -v ffmpeg || true)"
          if [ -z "$FFMPEG_STATIC" ]; then
            echo "❌ Tidak ada ffmpeg sama sekali (apt gagal install)."
            exit 1
          fi

          # johnvansickle blokir curl tanpa User-Agent -> HTTP 415.
          # Jadi: pasang UA, retry, dan coba mirror GitHub (BtbN) sebagai fallback.
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          dl_static() {
            curl -fsSL --retry 4 --retry-delay 5 --retry-all-errors -A "$UA" "$1" -o /tmp/ffmpeg.tar.xz
          }
          for U in \
            "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" ; do
            echo "🔻 Mencoba download static ffmpeg: $U"
            if dl_static "$U" && tar -xf /tmp/ffmpeg.tar.xz -C /tmp 2>/dev/null; then
              D=$(ls -d /tmp/ffmpeg-*-amd64-static 2>/dev/null | head -1)
              [ -z "$D" ] && D=$(ls -d /tmp/ffmpeg-master-latest-linux64-gpl 2>/dev/null | head -1)
              if [ -n "$D" ]; then
                if [ -x "$D/ffmpeg" ]; then FFMPEG_STATIC="$D/ffmpeg"
                elif [ -x "$D/bin/ffmpeg" ]; then FFMPEG_STATIC="$D/bin/ffmpeg"
                fi
              fi
              if [ -n "$FFMPEG_STATIC" ] && [ -x "$FFMPEG_STATIC" ]; then
                echo "✅ static ffmpeg siap: $FFMPEG_STATIC"
                break
              fi
            fi
            echo "⚠️  Gagal dari $U, coba mirror berikutnya..."
          done

          echo "FFMPEG_STATIC=$FFMPEG_STATIC" >> $GITHUB_ENV
          "$FFMPEG_STATIC" -version | head -1
          "$FFMPEG_STATIC" -hide_banner -encoders 2>/dev/null | grep -E "libx265|libx264" || echo "⚠️ encoder x26x tidak ditemukan (HEVC akan dilewati, original tetap utuh)"

      - name: Record stream
        run: |
          echo "🎬 Starting recording..."
          echo "URL: ${{ steps.inputs.outputs.m3u8_url }}"
          echo "Duration: ${{ steps.inputs.outputs.human_duration }}"
          echo "Output: ${{ steps.fname.outputs.filename }}"

          FILE="${{ steps.fname.outputs.filename }}"
          REFERRER="${{ steps.inputs.outputs.referer }}"
          if [ -n "$REFERRER" ]; then
            echo "Referer: $REFERRER"
          fi

          # Wall-clock guard: ffmpeg -t tidak dihormati untuk live HLS + -c copy
          # (playlist live tak punya EXT-X-ENDLIST, ffmpeg terus nangkring segmen
          # baru). Jadi kasih backstop keras di durasi + 120s, di-wrap `timeout`.
          REC_WALL=$(( ${{ steps.inputs.outputs.duration }} + 120 ))
          echo "🛡 Wall-clock guard: auto-stop di ${REC_WALL}s (durasi + 120s buffer)"

          # Build ffmpeg args
          FFMPEG_ARGS=(-hide_banner -loglevel info
            -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
            -fflags +genpts
            -avoid_negative_ts make_zero
            -protocol_whitelist "file,http,https,tcp,tls,crypto"
            -reconnect 1
            -reconnect_streamed 1
            -reconnect_delay_max 30
            -timeout 6000000
            -timelimit "$REC_WALL")

          if [ -n "$REFERRER" ]; then
            FFMPEG_ARGS+=(-referer "$REFERRER")
          fi

          FFMPEG_ARGS+=(-i "${{ steps.inputs.outputs.m3u8_url }}"
            -c copy
            -movflags +faststart
            -max_muxing_queue_size 1024
            -t ${{ steps.inputs.outputs.duration }}
            -progress pipe:1
            "$FILE")

          # ---- Auto-retry loop ----
          MAX_RETRIES=3
          MIN_SIZE=102400   # 100 KB — di bawah ini dianggap gagal (bukan rekaman valid)
          ATTEMPT=1
          SUCCESS=0

          # Durasi request untuk progress bar rekam (kayak HEVC step)
          SRC_DUR_INT="${{ steps.inputs.outputs.duration }}"
          [ "$SRC_DUR_INT" -le 0 ] 2>/dev/null && SRC_DUR_INT=60

          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "──────────────────────────────────────"
            echo "🎬 Recording attempt ${ATTEMPT}/${MAX_RETRIES}"
            echo "──────────────────────────────────────"

            rm -f "$FILE"
            # Mulai 1 pesan progress rekam (edit-message, bukan spam)
            CHAT_ID="${{ steps.inputs.outputs.chat_id }}" FILENAME="$FILE" \
              TG_API_URL="${{ secrets.TG_API_URL || 'http://localhost:8081' }}" \
              BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
              PHASE_LABEL=Rekam \
              PROGRESS_MSG_FILE=/tmp/orvella_rec_msg_id \
              python3 scripts/progress.py start 2>/dev/null || true
            set +e
            # `timeout` = backstop keras: bunuh ffmpeg (SIGTERM, lalu SIGKILL +30s)
            # kalau -t / -timelimit gagal stop di live stream. File tetap valid
            # karena step sukses dicek dari ukuran file, bukan exit code.
            # -progress pipe:1 -> parse out_time_ms -> persen rekam real-time.
            LAST_PCT=-1; NEXT_SEND=0
            timeout -k 30 "$REC_WALL" ffmpeg "${FFMPEG_ARGS[@]}" 2>/dev/null | while IFS='=' read -r k v; do
              if [ "$k" = "out_time_ms" ]; then
                ms=${v%.*}
                [ "$ms" -gt 0 ] 2>/dev/null || continue
                cur=$(( ms / 1000000 ))
                pct=$(( (cur * 100) / SRC_DUR_INT ))
                [ "$pct" -gt 100 ] && pct=100
                now=$(date +%s)
                if [ "$pct" -ge "$((LAST_PCT + 10))" ] && [ "$now" -ge "$NEXT_SEND" ]; then
                  LAST_PCT=$(( (pct / 10) * 10 ))
                  NEXT_SEND=$(( now + 5 ))
                  echo "🔴 Rekam ${LAST_PCT}%"
                  CHAT_ID="${{ steps.inputs.outputs.chat_id }}" FILENAME="$FILE" \
                    TG_API_URL="${{ secrets.TG_API_URL || 'http://localhost:8081' }}" \
                    BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
                    PROGRESS_MSG_FILE=/tmp/orvella_rec_msg_id \
                    python3 scripts/progress.py progress "$LAST_PCT" 2>/dev/null || true
                fi
              fi
            done
            FFMPEG_EXIT=$?
            set -e

            if [ -f "$FILE" ]; then
              ACTUAL_SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
            else
              ACTUAL_SIZE=0
            fi
            echo "ℹ️  ffmpeg exit=${FFMPEG_EXIT}, file size=${ACTUAL_SIZE} bytes"

            # File valid (>= MIN_SIZE) → sukses, walau exit code != 0
            # (untuk live stream, exit non-zero sering berarti stream berakhir lebih awal,
            #  tapi file yang sudah terekam tetap valid dan layak disimpan)
            if [ "$ACTUAL_SIZE" -ge "$MIN_SIZE" ]; then
              SUCCESS=1
              if [ "$FFMPEG_EXIT" -ne 0 ]; then
                echo "⚠️  ffmpeg exit non-zero, tapi file valid (stream kemungkinan berakhir lebih awal). Diterima."
              else
                echo "✅ Recording attempt ${ATTEMPT} sukses."
              fi
              # Pastikan 100% lalu ubah jadi pesan final
              echo "🔴 Rekam 100%"
              CHAT_ID="${{ steps.inputs.outputs.chat_id }}" FILENAME="$FILE" \
                TG_API_URL="${{ secrets.TG_API_URL || 'http://localhost:8081' }}" \
                BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
                PHASE_LABEL=Rekam \
                PROGRESS_MSG_FILE=/tmp/orvella_rec_msg_id \
                python3 scripts/progress.py done 2>/dev/null || true
              break
            fi

            echo "❌ Attempt ${ATTEMPT} gagal (file hilang / terlalu kecil)."
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "⏳ Retry dalam 15 detik..."
              sleep 15
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "❌ Semua ${MAX_RETRIES} percobaan gagal. Tidak ada file valid."
            # Tandai progress rekam gagal
            CHAT_ID="${{ steps.inputs.outputs.chat_id }}" FILENAME="$FILE" \
              TG_API_URL="${{ secrets.TG_API_URL || 'http://localhost:8081' }}" \
              BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
              PHASE_LABEL=Rekam \
              PROGRESS_MSG_FILE=/tmp/orvella_rec_msg_id \
              python3 scripts/progress.py fail 2>/dev/null || true
            exit 1
          fi

          echo "✅ Recording complete!"
          ls -lh "$FILE"
          # Export ukuran original untuk step segmentasi >2GB
          echo "FILE_SIZE=$(ls -lh "$FILE" 2>/dev/null | awk '{print $5}')" >> $GITHUB_ENV
          echo "ORIG_BYTES=$(stat -c%s "$FILE" 2>/dev/null || echo 0)" >> $GITHUB_ENV

      - name: Extract metadata and thumbnail
        id: meta
        if: success()
        run: |
          FILE="${{ steps.fname.outputs.filename }}"
          THUMB="${FILE%.mp4}.jpg"

          # ---- Probe metadata (semua defensif, gagal = nilai default) ----
          DUR_RAW=$(ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          [ -z "$DUR_RAW" ] && DUR_RAW=0
          DUR_INT=${DUR_RAW%.*}
          [ -z "$DUR_INT" ] && DUR_INT=0
          case "$DUR_INT" in
            ''|*[!0-9]*) DUR_INT=0 ;;
          esac
          REAL_DURATION=$(printf '%02d:%02d:%02d' \
            $((DUR_INT/3600)) $(((DUR_INT%3600)/60)) $((DUR_INT%60)))

          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          if [ -n "$WIDTH" ] && [ -n "$HEIGHT" ]; then
            RESOLUTION="${WIDTH}x${HEIGHT}"
          else
            RESOLUTION="?"
          fi

          VCODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          [ -z "$VCODEC" ] && VCODEC="?"

          BR_RAW=$(ffprobe -v error -show_entries format=bit_rate \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          case "$BR_RAW" in
            ''|*[!0-9]*) VBITRATE="?" ;;
            *) VBITRATE="$(awk "BEGIN{printf \"%.1f Mbps\", ${BR_RAW}/1000000}")" ;;
          esac

          FILE_SIZE=$(ls -lh "$FILE" 2>/dev/null | awk '{print $5}')
          [ -z "$FILE_SIZE" ] && FILE_SIZE="?"

          echo "📊 Metadata:"
          echo "   Durasi asli : $REAL_DURATION"
          echo "   Resolusi    : $RESOLUTION"
          echo "   Codec       : $VCODEC"
          echo "   Bitrate     : $VBITRATE"
          echo "   Ukuran      : $FILE_SIZE"

          # ---- Thumbnail dari tengah video (hindari frame hitam di awal) ----
          if [ "$DUR_INT" -gt 6 ]; then
            SEEK=$((DUR_INT / 2))
          else
            SEEK=1
          fi
          echo "🖼  Membuat thumbnail (seek ${SEEK}s)..."

          HAS_THUMB=0
          ffmpeg -hide_banner -loglevel error -y -ss "$SEEK" -i "$FILE" \
            -frames:v 1 -q:v 2 -vf "scale=640:-2" "$THUMB" 2>/dev/null || true

          # Fallback: kalau seek tengah gagal, coba dari detik ke-1
          if [ ! -s "$THUMB" ]; then
            echo "⚠️  Thumbnail tengah gagal, fallback ke detik 1..."
            ffmpeg -hide_banner -loglevel error -y -ss 1 -i "$FILE" \
              -frames:v 1 -q:v 2 -vf "scale=640:-2" "$THUMB" 2>/dev/null || true
          fi

          # Fallback terakhir: frame pertama tanpa seek
          if [ ! -s "$THUMB" ]; then
            echo "⚠️  Fallback terakhir, frame pertama..."
            ffmpeg -hide_banner -loglevel error -y -i "$FILE" \
              -frames:v 1 -q:v 2 -vf "scale=640:-2" "$THUMB" 2>/dev/null || true
          fi

          if [ -s "$THUMB" ]; then
            HAS_THUMB=1
            echo "✅ Thumbnail dibuat: $THUMB ($(stat -c%s "$THUMB" 2>/dev/null || echo 0) bytes)"
          else
            echo "⚠️  Thumbnail tidak bisa dibuat (dilewati, tidak menggagalkan job)."
            rm -f "$THUMB"
          fi

          # ---- Export ke env untuk step berikutnya ----
          {
            echo "REAL_DURATION=$REAL_DURATION"
            echo "RESOLUTION=$RESOLUTION"
            echo "VCODEC=$VCODEC"
            echo "VBITRATE=$VBITRATE"
            echo "FILE_SIZE=$FILE_SIZE"
            echo "THUMB_FILE=$THUMB"
            echo "HAS_THUMB=$HAS_THUMB"
          } >> $GITHUB_ENV

      - name: Segment ORIGINAL kalau >2GB (biar bisa dikirim utuh)
        if: success()
        run: |
          FILE="${{ steps.fname.outputs.filename }}"
          ORIG_BYTES=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
          if [ "${{ steps.inputs.outputs.simulate_over_2gb }}" = "true" ]; then
            ORIG_BYTES=3221225472
          fi
          MAX=$((2*1024*1024*1024))
          if [ "$ORIG_BYTES" -gt "$MAX" ]; then
            echo "🧩 ORIGINAL $(numfmt --to=iec $ORIG_BYTES) > 2GB — pecah jadi segment <1.9GB"
            SEG_DIR="segments"
            rm -rf "$SEG_DIR"; mkdir -p "$SEG_DIR"
            # -f segment: potong by size (~1.9GB), -c copy (tanpa re-encode)
            ffmpeg -hide_banner -y -i "$FILE" \
              -c copy -map 0 \
              -f segment -segment_format mp4 \
              -reset_timestamps 1 \
              -fs 2000000000 \
              "$SEG_DIR/part-%03d.mp4" 2>/dev/null || true
            # verify ada segment
            if ls "$SEG_DIR"/part-*.mp4 >/dev/null 2>&1; then
              echo "SEGMENTED=1" >> $GITHUB_ENV
              echo "SEG_DIR=$SEG_DIR" >> $GITHUB_ENV
              echo "✅ Segment siap:"
              ls -lh "$SEG_DIR"/part-*.mp4
            else
              echo "⚠️ Segment gagal, fallback kirim file utuh (maybe >2GB dilewati)"
              echo "SEGMENTED=0" >> $GITHUB_ENV
            fi
          else
            echo "✅ ORIGINAL $(numfmt --to=iec $ORIG_BYTES) ≤ 2GB, tidak perlu segment"
            echo "SEGMENTED=0" >> $GITHUB_ENV
          fi

      - name: Buat .txt (update log kecil) + Release ringan
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE="${{ steps.fname.outputs.filename }}"
          TAG="orvella-$(date +%s)"
          TITLE="Orvella Vault — $(date '+%Y-%m-%d %H:%M:%S') WIB (${{ steps.inputs.outputs.duration_label }})"

          # --- Extract URL segmen .ts dari playlist (bukan .m3u8) ---
          M3U8="${{ steps.inputs.outputs.m3u8_url }}"
          REF="${{ steps.inputs.outputs.referer }}"
          resolve_url() {
            b="$1"; r="$2"
            case "$r" in
              http*) echo "$r"; return ;;
            esac
            d="${b%/*}"
            case "$r" in
              /*) sh=$(echo "$b" | sed -E 's#^(https?://[^/]+).*#\1#'); echo "$sh$r" ;;
              *) echo "$d/$r" ;;
            esac
          }
          fetch_h() {
            if [ -n "$REF" ]; then
              curl -s -L -H "Referer: $REF" -H "User-Agent: Mozilla/5.0" "$1"
            else
              curl -s -L -H "User-Agent: Mozilla/5.0" "$1"
            fi
          }
          PL=$(fetch_h "$M3U8")
          VAR=$(echo "$PL" | grep -E '\.m3u8' | head -1)
          if [ -n "$VAR" ] && [ "$VAR" != "$M3U8" ]; then
            PL=$(fetch_h "$(resolve_url "$M3U8" "$VAR")")
          fi
          TSLINE=$(echo "$PL" | grep -E '\.ts' | head -1)
          if [ -n "$TSLINE" ]; then
            TS_URL="$(resolve_url "$M3U8" "$TSLINE")"
          else
            TS_URL="$M3U8"
          fi
          echo "TS_URL=$TS_URL" >> $GITHUB_ENV

          # .txt = file kecil berisi metadata + URL sumber (.ts) — bukan video
          TXT="${FILE%.mp4}.txt"
          {
            echo "# Orvella Vault — record update"
            echo "file: ${FILE}"
            echo "size: ${FILE_SIZE}"
            echo "durasi: ${REAL_DURATION}"
            echo "resolusi: ${RESOLUTION}"
            echo "codec: ${VCODEC}"
            echo "bitrate: ${VBITRATE}"
            echo "source_url: $TS_URL"
            echo "referer: ${{ steps.inputs.outputs.referer }}"
            echo "status: sent-to-telegram"
            echo "recorded_at: $(date '+%Y-%m-%dT%H:%M:%S %z')"
          } > "$TXT"

          NOTES="Orvella Vault — record update (lightweight log). Metadata + URL sumber disimpan, video dikirim ke Telegram (tidak disimpan di GitHub)."

          # Release cuma berisi .txt (kecil, persist sebagai update log)
          gh release create "$TAG" --repo "${{ github.repository }}" \
            --title "${TITLE}" --notes "${NOTES}" \
            "$TXT" 2>/dev/null || \
          gh release create "$TAG" --repo "${{ github.repository }}" \
            --title "${TITLE}" --notes "${NOTES}" "$TXT"
          echo "✅ Created release $TAG (asset: $(ls -lh "$TXT" | awk '{print $5}') .txt)"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "TXT_FILE=$TXT" >> $GITHUB_ENV

      - name: Start local Bot API Server (allow >50MB uploads)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TG_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TG_API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set +e
          docker rm -f tg-bot-api >/dev/null 2>&1 || true
          rm -rf /tmp/tg-bot-api && mkdir -p /tmp/tg-bot-api
          docker run -d --name tg-bot-api -p 8081:8081 \
            -e TELEGRAM_API_ID="$TELEGRAM_API_ID" \
            -e TELEGRAM_API_HASH="$TELEGRAM_API_HASH" \
            -e TELEGRAM_LOCAL=1 \
            -v /tmp/tg-bot-api:/var/lib/telegram-bot-api \
            aiogram/telegram-bot-api:latest \
            --local -m 2097152000 --dir /var/lib/telegram-bot-api --http-port 8081 --verbosity=2
          echo "⏳ Menunggu Bot API Server siap (hingga 90s)..."
          for i in $(seq 1 45); do
            CODE=$(curl -s -o /tmp/getme.json -w "%{http_code}" "http://localhost:8081/bot${{ secrets.BOT_TOKEN }}/getMe" 2>/dev/null)
            echo "  attempt $i: HTTP $CODE -> $(cat /tmp/getme.json 2>/dev/null | head -c 300)"
            if [ "$CODE" = "200" ]; then
              echo "✅ Bot API Server ready"
              break
            fi
            sleep 2
          done
          echo "================ SERVER LOG (docker logs) ================"
          docker logs --tail 60 tg-bot-api 2>&1 || echo "(no docker logs)"
          echo "================ END SERVER LOG ================"

      - name: Notify Telegram — ORIGINAL (rekam selesai)
        if: always()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id }}
          FILENAME: ${{ steps.fname.outputs.filename }}
          HUMAN_DUR: ${{ steps.inputs.outputs.human_duration }}
          TAG: ${{ env.TAG }}
          JOB_STATUS: ${{ job.status }}
          REAL_DURATION: ${{ env.REAL_DURATION }}
          RESOLUTION: ${{ env.RESOLUTION }}
          VCODEC: ${{ env.VCODEC }}
          VBITRATE: ${{ env.VBITRATE }}
          FILE_SIZE: ${{ env.FILE_SIZE }}
          ORIG_BYTES: ${{ env.ORIG_BYTES }}
          THUMB_FILE: ${{ env.THUMB_FILE }}
          HAS_THUMB: ${{ env.HAS_THUMB }}
          TG_API_URL: ${{ secrets.TG_API_URL || 'http://localhost:8081' }}
          PHASE: original
        run: python3 scripts/notify.py

      - name: Encode to HEVC 10-bit (copy tambahan, asli tetap utuh)
        id: hevc
        if: always()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id }}
          FILENAME: ${{ steps.fname.outputs.filename }}
          DURATION_SEC: ${{ steps.inputs.outputs.duration }}
          TG_API_URL: ${{ secrets.TG_API_URL || 'http://localhost:8081' }}
        run: |
          FILE="${{ steps.fname.outputs.filename }}"
          HEVC_FILE="${FILE%.mp4}-h265-10bit.mp4"
          FFMPEG_STATIC="${{ env.FFMPEG_STATIC }}"
          HEVC_PRESET="${{ steps.inputs.outputs.hevc_preset || 'veryfast' }}"
          HEVC_CRF="${{ steps.inputs.outputs.hevc_crf || '24' }}"
          echo "🎞  Encoding HEVC 10-bit (main10, yuv420p10le, preset=${HEVC_PRESET}, CRF ${HEVC_CRF})..."

          # Durasi untuk progress bar: pakai durasi request (DURATION_SEC),
          # BUKAN ffprobe — hasil -c copy dari live stream sering N/A.
          SRC_DUR_INT="${DURATION_SEC:-60}"
          [ "$SRC_DUR_INT" -le 0 ] && SRC_DUR_INT=60

          # Start 1 pesan progress (edit-message, bukan spam)
          python3 scripts/progress.py start || true

          # Pipeline: ffmpeg dengan -progress pipe, parse out_time_ms -> persen
          LAST_PCT=-1
          NEXT_SEND=0
          "$FFMPEG_STATIC" -hide_banner -y -i "$FILE" \
            -c:v libx265 -profile:v main10 -pix_fmt yuv420p10le \
            -crf ${HEVC_CRF} -preset ${HEVC_PRESET} -tag:v hvc1 \
            -c:a copy \
            -progress pipe:1 \
            "$HEVC_FILE" 2>/dev/null | while IFS='=' read -r k v; do
            if [ "$k" = "out_time_ms" ]; then
              ms=${v%.*}
              echo "DEBUG out_time_ms raw=[$v] ms=[$ms] SRC_DUR_INT=[$SRC_DUR_INT]" >&2
              [ "$ms" -gt 0 ] 2>/dev/null || { echo "DEBUG skip non-numeric ms" >&2; continue; }
              cur=$(( ms / 1000000 ))
              pct=$(( (cur * 100) / SRC_DUR_INT ))
              [ "$pct" -gt 100 ] && pct=100
              now=$(date +%s)
              if [ "$pct" -ge "$((LAST_PCT + 10))" ] && [ "$now" -ge "$NEXT_SEND" ]; then
                LAST_PCT=$(( (pct / 10) * 10 ))
                NEXT_SEND=$(( now + 5 ))
                echo "🔄 HEVC encode ${LAST_PCT}%"
                CHAT_ID="$CHAT_ID" FILENAME="$FILE" TG_API_URL="$TG_API_URL" \
                  BOT_TOKEN="$BOT_TOKEN" PROGRESS_MSG_FILE=/tmp/orvella_progress_msg_id \
                  python3 scripts/progress.py progress "$LAST_PCT" || true
              fi
            fi
          done
          # Pastikan 100% lalu ubah jadi pesan final (edit, bukan chat baru)
          echo "🔄 HEVC encode 100%"
          CHAT_ID="$CHAT_ID" FILENAME="$FILE" TG_API_URL="$TG_API_URL" \
            BOT_TOKEN="$BOT_TOKEN" PROGRESS_MSG_FILE=/tmp/orvella_progress_msg_id \
            python3 scripts/progress.py done || true
          if [ -s "$HEVC_FILE" ]; then
            echo "✅ HEVC 10-bit selesai: $(ls -lh "$HEVC_FILE" | awk '{print $5}')"
            echo "HEVC_FILE=$HEVC_FILE" >> $GITHUB_ENV
            echo "HEVC_SIZE=$(ls -lh "$HEVC_FILE" | awk '{print $5}')" >> $GITHUB_ENV
            # Metadata asli hasil encode (ffprobe)
            HDUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            HDUR_INT=${HDUR%.*}
            [ -z "$HDUR_INT" ] && HDUR_INT=0
            HEVC_DUR=$(printf '%02d:%02d:%02d' $((HDUR_INT/3600)) $(((HDUR_INT%3600)/60)) $((HDUR_INT%60)))
            HW=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            HH=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            [ -n "$HW" ] && [ -n "$HH" ] && echo "HEVC_RES=${HW}x${HH}" >> $GITHUB_ENV
            HCV=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            [ -n "$HCV" ] && echo "HEVC_VCODEC=$HCV" >> $GITHUB_ENV
            HPF=$(ffprobe -v error -select_streams v:0 -show_entries stream=pix_fmt -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            [ -n "$HPF" ] && echo "HEVC_PIX_FMT=$HPF" >> $GITHUB_ENV
            echo "HEVC pixel format: ${HPF:-unknown}"
            HBR=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            case "$HBR" in
              ''|*[!0-9]*) ;;
              *) echo "HEVC_VBITRATE=$(awk "BEGIN{printf \"%.1f Mbps\", ${HBR}/1000000}")" >> $GITHUB_ENV ;;
            esac
            echo "HEVC_DUR=$HEVC_DUR" >> $GITHUB_ENV
            # Thumbnail khusus HEVC 10-bit (dari hasil encode, bukan punya original)
            HEVC_THUMB="${HEVC_FILE%.mp4}.jpg"
            HDUR_INT2=${HDUR_INT:-0}
            HSEEK=1
            [ "$HDUR_INT2" -gt 6 ] && HSEEK=$((HDUR_INT2 / 2))
            "$FFMPEG_STATIC" -hide_banner -loglevel error -y -ss "$HSEEK" -i "$HEVC_FILE" \
              -frames:v 1 -q:v 2 -vf "scale=640:-2" "$HEVC_THUMB" 2>/dev/null || true
            if [ ! -s "$HEVC_THUMB" ]; then
              "$FFMPEG_STATIC" -hide_banner -loglevel error -y -ss 1 -i "$HEVC_FILE" \
                -frames:v 1 -q:v 2 -vf "scale=640:-2" "$HEVC_THUMB" 2>/dev/null || true
            fi
            if [ -s "$HEVC_THUMB" ]; then
              echo "HEVC_THUMB_FILE=$HEVC_THUMB" >> $GITHUB_ENV
              echo "HAS_HEVC_THUMB=1" >> $GITHUB_ENV
              echo "✅ Thumbnail HEVC dibuat: $HEVC_THUMB"
            else
              echo "HAS_HEVC_THUMB=0" >> $GITHUB_ENV
              echo "⚠️  Thumbnail HEVC gagal."
            fi
          else
            echo "⚠️  Encode HEVC gagal, dilewati (file asli tetap diupload)."
          fi

      - name: Notify Telegram — HEVC 10-bit (encode selesai)
        if: always()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id }}
          FILENAME: ${{ steps.fname.outputs.filename }}
          HUMAN_DUR: ${{ steps.inputs.outputs.human_duration }}
          TAG: ${{ env.TAG }}
          JOB_STATUS: ${{ job.status }}
          REAL_DURATION: ${{ env.REAL_DURATION }}
          RESOLUTION: ${{ env.RESOLUTION }}
          VCODEC: ${{ env.VCODEC }}
          VBITRATE: ${{ env.VBITRATE }}
          FILE_SIZE: ${{ env.FILE_SIZE }}
          ORIG_BYTES: ${{ env.ORIG_BYTES }}
          THUMB_FILE: ${{ env.THUMB_FILE }}
          HAS_THUMB: ${{ env.HAS_THUMB }}
          HEVC_FILE: ${{ env.HEVC_FILE }}
          HEVC_SIZE: ${{ env.HEVC_SIZE }}
          HEVC_RES: ${{ env.HEVC_RES }}
          HEVC_VCODEC: ${{ env.HEVC_VCODEC }}
          HEVC_VBITRATE: ${{ env.HEVC_VBITRATE }}
          HEVC_DUR: ${{ env.HEVC_DUR }}
          HEVC_THUMB_FILE: ${{ env.HEVC_THUMB_FILE }}
          HAS_HEVC_THUMB: ${{ env.HAS_HEVC_THUMB }}
          TG_API_URL: ${{ secrets.TG_API_URL || 'http://localhost:8081' }}
          PHASE: hevc
        run: python3 scripts/notify.py

      - name: Bersihkan file video di disk runner (biar tidak tersisa)
        if: always()
        continue-on-error: true
        run: |
          echo "🧹 Menghapus sisa file video/thumb di disk runner..."
          F="${{ steps.fname.outputs.filename }}"
          # Hapus MP4 + JPG + segment + file .txt lokal (asset .txt sudah di release)
          rm -f "$F" 2>/dev/null
          rm -f "${{ env.HEVC_FILE }}" 2>/dev/null
          rm -f "${{ env.THUMB_FILE }}" 2>/dev/null
          rm -f "${{ env.HEVC_THUMB_FILE }}" 2>/dev/null
          rm -f segments/part-*.mp4 2>/dev/null
          rm -f "${F%.mp4}"*.txt 2>/dev/null
          rm -f *.mp4 *.jpg 2>/dev/null
          echo "✅ Disk runner dibersihkan (GitHub hanya menyimpan .txt di Release)"
