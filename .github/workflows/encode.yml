name: orvella-encode

# Workflow TERPISAH untuk encode HEVC.
# Dipicu oleh record.yml (setelah rekam + kirim original ke Telegram) lewat
# repository_dispatch type=encode-request. Tujuannya: encode video ORIGINAL
# yang sudah di-upload ke GitHub Release SEMENTARA oleh record.yml, lalu kirim
# hasil HEVC ke Telegram. Karena jalan di runner sendiri, encode punya 6 jam penuh
# (tidak lagi berbagi waktu dengan rekam).

permissions:
  contents: write

on:
  repository_dispatch:
    types: [encode-request]

jobs:
  encode:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: Asia/Jakarta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get inputs
        id: inputs
        run: |
          echo "file_id=${{ github.event.client_payload.file_id }}" >> $GITHUB_OUTPUT
          echo "filename=${{ github.event.client_payload.filename }}" >> $GITHUB_OUTPUT
          echo "chat_id=${{ github.event.client_payload.chat_id }}" >> $GITHUB_OUTPUT
          echo "human_duration=${{ github.event.client_payload.human_duration }}" >> $GITHUB_OUTPUT
          echo "duration=${{ github.event.client_payload.duration }}" >> $GITHUB_OUTPUT
          echo "release_tag=${{ github.event.client_payload.release_tag }}" >> $GITHUB_OUTPUT
          echo "hevc_preset=${{ github.event.client_payload.hevc_preset || 'veryfast' }}" >> $GITHUB_OUTPUT
          echo "hevc_crf=${{ github.event.client_payload.hevc_crf || '24' }}" >> $GITHUB_OUTPUT
          echo "orv_id=${{ github.event.client_payload.orv_id || '' }}" >> $GITHUB_OUTPUT

      # === Link run_id -> orv_id ke KV (biar /status bisa baca % encode) ===
      - name: Link run ke ORV-ID (KV)
        if: always()
        continue-on-error: true
        env:
          ORV_ID: ${{ github.event.client_payload.orv_id || '' }}
          WORKER_URL: ${{ secrets.WORKER_URL || 'https://rusemeva.rusemeva.workers.dev' }}
          PROGRESS_SECRET: ${{ secrets.PROGRESS_SECRET || '' }}
        run: |
          if [ -n "$ORV_ID" ]; then
            curl -fsS --retry 2 --retry-delay 3 -X POST "$WORKER_URL/link" \
              -H "Content-Type: application/json" \
              -d "{\"run_id\":\"${{ github.run_id }}\",\"orv_id\":\"$ORV_ID\",\"secret\":\"$PROGRESS_SECRET\"}" 2>/dev/null \
              && echo "🔗 run ${{ github.run_id }} -> $ORV_ID" || echo "⚠️ link gagal (non-fatal)"
          else
            echo "ℹ️ tidak ada orv_id, skip link"
          fi

      - name: Install dependencies (static ffmpeg untuk HEVC)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg >/dev/null 2>&1 || true
          FFMPEG_STATIC="$(command -v ffmpeg || true)"
          if [ -z "$FFMPEG_STATIC" ]; then echo "❌ no ffmpeg"; exit 1; fi
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          dl_static() { curl -fsSL --retry 4 --retry-delay 5 --retry-all-errors -A "$UA" "$1" -o /tmp/ffmpeg.tar.xz; }
          for U in \
            "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" ; do
            if dl_static "$U" && tar -xf /tmp/ffmpeg.tar.xz -C /tmp 2>/dev/null; then
              D=$(ls -d /tmp/ffmpeg-*-amd64-static 2>/dev/null | head -1)
              [ -z "$D" ] && D=$(ls -d /tmp/ffmpeg-master-latest-linux64-gpl 2>/dev/null | head -1)
              if [ -n "$D" ]; then
                if [ -x "$D/ffmpeg" ]; then FFMPEG_STATIC="$D/ffmpeg";
                elif [ -x "$D/bin/ffmpeg" ]; then FFMPEG_STATIC="$D/bin/ffmpeg"; fi
              fi
              if [ -n "$FFMPEG_STATIC" ] && [ -x "$FFMPEG_STATIC" ]; then echo "✅ static ffmpeg: $FFMPEG_STATIC"; break; fi
            fi
            echo "⚠️ gagal $U"
          done
          echo "FFMPEG_STATIC=$FFMPEG_STATIC" >> $GITHUB_ENV
          "$FFMPEG_STATIC" -version | head -1

      - name: Download ORIGINAL dari GitHub Release sementara
        id: dl
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.inputs.outputs.release_tag }}"
          RAW="${{ steps.inputs.outputs.filename }}"
          echo "📥 Download original dari release temp: $TAG / $RAW"
          mkdir -p /tmp/orvella_dl
          # Download SEMUA asset dari release temp (original utuh ATAU segment part-*)
          gh release download "$TAG" --repo "${{ github.repository }}" --dir /tmp/orvella_dl \
            && echo "✅ Download semua asset release temp" \
            || echo "⚠️ gh release download gagal"
          echo "📂 Isi download:"
          ls -lh /tmp/orvella_dl

          # Kalau terpecah jadi segment (part-*), re-assemble jadi file utuh.
          # Karena byte-split, cukup `cat` balik dalam urutan ter-sort ->
          # hasil BIT-IDENTIK dgn original (tidak perlu ffmpeg concat).
          if ls /tmp/orvella_dl/part-* >/dev/null 2>&1; then
            echo "🧩 Segment terdeteksi, re-assemble via cat (urutan sort)..."
            cat $(ls /tmp/orvella_dl/part-* | sort) > "/tmp/orvella_dl/$RAW"
            echo "✅ Re-assembled: $(ls -lh "/tmp/orvella_dl/$RAW" | awk '{print $5}')"
          fi

          if [ -s "/tmp/orvella_dl/$RAW" ]; then
            echo "ORIG_FILE=/tmp/orvella_dl/$RAW" >> $GITHUB_OUTPUT
            echo "✅ Original siap: $(ls -lh /tmp/orvella_dl/$RAW | awk '{print $5}')"
          else
            echo "❌ Original gagal didownload"
            exit 1
          fi

      - name: Start local Bot API Server (allow >2GB uploads)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TG_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TG_API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set +e
          docker rm -f tg-bot-api >/dev/null 2>&1 || true
          rm -rf /tmp/tg-bot-api && mkdir -p /tmp/tg-bot-api
          docker run -d --name tg-bot-api -p 8081:8081 \
            -e TELEGRAM_API_ID="$TELEGRAM_API_ID" \
            -e TELEGRAM_API_HASH="$TELEGRAM_API_HASH" \
            -e TELEGRAM_LOCAL=1 \
            -v /tmp/tg-bot-api:/var/lib/telegram-bot-api \
            aiogram/telegram-bot-api:latest \
            --local -m 2097152000 --dir /var/lib/telegram-bot-api --http-port 8081 --verbosity=2
          echo "⏳ Menunggu Bot API Server siap..."
          for i in $(seq 1 45); do
            CODE=$(curl -s -o /tmp/getme.json -w "%{http_code}" "http://localhost:8081/bot${{ secrets.BOT_TOKEN }}/getMe" 2>/dev/null)
            if [ "$CODE" = "200" ]; then echo "✅ Bot API Server ready"; break; fi
            sleep 2
          done

      - name: Auto-downgrade preset (real-measure 60s sample)
        id: autodg
        run: |
          # --- STRATEGI: ukur kecepatan RIIL lewat sample 60s encode,
          # bukan tabel statis (terbukti meleset buat 'slower').
          # 1) Encode 60s pakai preset PILIHAN -> dapat fps riil.
          # 2) Hitung realtime_x = fps_encode / fps_video_asli.
          # 3) Cascade: pilih preset TERTINGGI (paling lambat) yg est <= 350m.
          ORIG="${{ steps.dl.outputs.ORIG_FILE }}"
          PRESET="${{ steps.inputs.outputs.hevc_preset || 'medium' }}"
          CRF_VAL="${{ steps.inputs.outputs.hevc_crf || '22' }}"
          DUR="${{ steps.inputs.outputs.duration }}"
          [ -z "$DUR" ] || [ "$DUR" -le 0 ] 2>/dev/null && DUR=3600
          LIMIT_MIN=350
          OVERHEAD_MIN=15
          FFMPEG_STATIC="${{ env.FFMPEG_STATIC }}"

          # fps video asli (biar tahu realtime_x)
          VFPS=$(ffprobe -v error -select_streams v:0 -show_entries stream=avg_frame_rate -of default=noprint_wrappers=1:nokey=1 "$ORIG" 2>/dev/null | head -1)
          VFPS_NUM=$(awk -F/ '{if(NF==2) printf "%.2f", $1/$2; else printf "%.2f", $1}' <<<"$VFPS" 2>/dev/null || echo 30)
          [ -z "$VFPS_NUM" ] && VFPS_NUM=30
          echo "📐 FPS video asli: $VFPS_NUM"

          # --- Sample 60s encode pakai preset PILIHAN ---
          echo "⏱ Sampling 60s encode dgn preset '$PRESET' (CRF $CRF_VAL)..."
          SAMPLE_OUT="/tmp/orvella_sample.mkv"
          # -progress pipe -> ambil 'fps=' terakhir
          timeout 75 "$FFMPEG_STATIC" -hide_banner -y -ss 0 -i "$ORIG" -t 60 \
            -c:v libx265 -profile:v main10 -pix_fmt yuv420p10le \
            -crf "$CRF_VAL" -preset "$PRESET" -tag:v hvc1 \
            -an -progress pipe:1 "$SAMPLE_OUT" 2>/dev/null \
            | awk -F= '/^fps=/{v=$2} END{ if(v!="") print v }' > /tmp/orvella_fps.txt
          SAMPLE_FPS=$(cat /tmp/orvella_fps.txt 2>/dev/null | head -1)
          rm -f "$SAMPLE_OUT" 2>/dev/null || true
          if [ -z "$SAMPLE_FPS" ] || awk "BEGIN{exit !($SAMPLE_FPS<=0)}"; then
            echo "⚠️ Sample gak dapet fps -> fallback tabel statis"
            SAMPLE_FPS=""
          fi
          echo "🎞 FPS encode sample ($PRESET): ${SAMPLE_FPS:-?}"

          # Faktor relatif antar preset (standar x265 ladder; medium=1.0)
          declare -A RT=(
            [ultrafast]=20 [superfast]=12 [veryfast]=6 [faster]=4 [fast]=3
            [medium]=1.0 [slow]=0.7 [slower]=0.45 [veryslow]=0.25 [placebo]=0.1
            [speed]=6 [balanced]=1.0 [quality]=0.7 [max]=0.25
          )
          LADDER=( placebo veryslow slower slow medium fast faster veryfast superfast ultrafast )

          # realtime_x dasar: dari sample (atau fallback tabel)
          if [ -n "$SAMPLE_FPS" ] && awk "BEGIN{exit !($SAMPLE_FPS>0)}"; then
            BASE_RT=$(awk "BEGIN{printf \"%.4f\", $SAMPLE_FPS / $VFPS_NUM}")
          else
            # fallback: pakai tabel statis buat preset pilihan
            PRT=${RT[$PRESET]:-0.3}
            BASE_RT=$PRT
            echo "↩️ Fallback realtime_x=$BASE_RT (tabel)"
          fi
          echo "🔁 realtime_x dasar ($PRESET): ${BASE_RT}x"

          # === #7 KALIBRASI RT OTOMATIS ===
          # KV orv:rtcal:<preset> menyimpan realtime_x AKTUAL (rata-rata histori).
          # Kalau ada, pakai sebagai BASE_RT (lebih akurat dari sample 60s).
          CAL=""
          if command -v curl >/dev/null 2>&1; then
            CAL=$(curl -fsS --retry 2 --retry-delay 2 "https://rusemeva.rusemeva.workers.dev/rtcal?preset=${PRESET}" 2>/dev/null | head -c 40)
          fi
          if [ -n "$CAL" ] && awk "BEGIN{exit !($CAL>0)}" 2>/dev/null; then
            BASE_RT=$CAL
            echo "🎯 Kalibrasi aktif: realtime_x disesuaikan ke ${BASE_RT}x (dari histori riil)"
          else
            echo "ℹ️ Belum ada kalibrasi untuk '$PRESET' — pakai sample riil."
          fi

          # Estimasi per preset: est_min = (DUR/60 / realtime_x_preset) + overhead
          # realtime_x_preset = BASE_RT * (RT[PRESET] / RT[chosen])
          CHOSEN_RT=${RT[$PRESET]:-0.3}

          FINAL="$PRESET"
          FINAL_CRF="$CRF_VAL"
          FINAL_RT="$BASE_RT"
          best_est=9999
          for p in "${LADDER[@]}"; do
            prt=${RT[$p]:-1.0}
            # realtime_x untuk preset p
            rtp=$(awk "BEGIN{printf \"%.4f\", $BASE_RT * ($prt / $CHOSEN_RT)}")
            est=$(awk "BEGIN{printf \"%d\", ($DUR/60 / $rtp) + $OVERHEAD_MIN}")
            echo "   • $p: ${rtp}x realtime -> est ${est}m"
            # pilih preset TERTINGGI (paling lambat = realtime_x terkecil) yg muat
            if [ "$est" -le "$LIMIT_MIN" ]; then
              if awk "BEGIN{exit !($rtp < $FINAL_RT)}"; then
                FINAL="$p"; FINAL_CRF="$CRF_VAL"; FINAL_RT="$rtp"
              fi
            fi
          done

          if [ "$FINAL" = "$PRESET" ]; then
            echo "✅ Estimasi aman, pakai preset asli: $FINAL (${FINAL_RT}x, est di bawah ${LIMIT_MIN}m)"
          else
            echo "🔻 Turun ke: $FINAL (CRF $FINAL_CRF, ${FINAL_RT}x realtime) biar muat 6 jam"
          fi
          echo "FINAL_PRESET=$FINAL" >> $GITHUB_OUTPUT
          echo "FINAL_CRF=$FINAL_CRF" >> $GITHUB_OUTPUT

      # === #5 DISK WATCHDOG: cancel run kalau disk runner >90% penuh ===
      # Encode file besar bisa nyangkut / gagal kalau disk penuh. Lebih baik
      # dibatalkan + dilaporkan daripada timeout 6 jam sia-sia.
      - name: Disk watchdog — cek ruang sebelum encode
        if: success()
        continue-on-error: false
        env:
          GH_TOKEN: ${{ github.token }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id }}
          TG_API_URL: ${{ secrets.TG_API_URL || 'http://localhost:8081' }}
          ORV_ID: ${{ steps.inputs.outputs.orv_id || '' }}
        run: |
          USE=$(df -h /tmp | awk 'NR==2{gsub("%","",$5); print $5}')
          echo "💽 Disk /tmp terpakai: ${USE}%"
          if [ "${USE:-0}" -ge 90 ]; then
            echo "🚨 Disk >90% penuh — batalkan run biar gak timeout sia-sia"
            MSG="🚨 <b>Disk runner penuh (${USE}%)</b> — encode dibatalkan otomatis.\n\n🆔 ID: <code>${ORV_ID}</code>\nℹ️ Coba lagi nanti (runner GitHub akan di-reset)."
            CHAT_ID="$CHAT_ID" TG_API_URL="$TG_API_URL" BOT_TOKEN="$BOT_TOKEN" python3 scripts/send_message.py "$MSG" || true
            gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel -X POST || true
            exit 1
          fi
          echo "✅ Ruang disk cukup."

      - name: Encode to HEVC 10-bit (dari original, full 6 jam)
        id: hevc
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id }}
          FILENAME: ${{ steps.inputs.outputs.filename }}
          DURATION_SEC: ${{ steps.inputs.outputs.duration }}
          TG_API_URL: ${{ secrets.TG_API_URL || 'http://localhost:8081' }}
          ORV_ID: ${{ steps.inputs.outputs.orv_id || '' }}
          WORKER_URL: ${{ secrets.WORKER_URL || 'https://rusemeva.rusemeva.workers.dev' }}
          PROGRESS_SECRET: ${{ secrets.PROGRESS_SECRET || '' }}
        run: |
          # #7 mulai timer kalibrasi
          ENC_START=$SECONDS
          FILE="${{ steps.dl.outputs.ORIG_FILE }}"
          HEVC_FILE="${FILE%.mp4}-h265-10bit.mp4"
          FFMPEG_STATIC="${{ env.FFMPEG_STATIC }}"
          HEVC_PRESET="${{ steps.autodg.outputs.FINAL_PRESET || 'veryfast' }}"
          HEVC_CRF="${{ steps.autodg.outputs.FINAL_CRF || '24' }}"
          CHOSEN="${{ steps.inputs.outputs.hevc_preset || 'balanced' }}"
          if [ "$CHOSEN" != "$HEVC_PRESET" ]; then
            MSG="🔻 <b>Auto-downgrade!</b> Preset <code>$CHOSEN</code> estimasi &gt;5j50m, otomatis turun ke <code>$HEVC_PRESET</code> (CRF $HEVC_CRF) biar muat 6 jam."
          else
            MSG="🎚 Encode pakai preset <code>$HEVC_PRESET</code> (CRF $HEVC_CRF)."
          fi
          CHAT_ID="$CHAT_ID" FILENAME="$FILE" TG_API_URL="$TG_API_URL" BOT_TOKEN="$BOT_TOKEN" python3 scripts/send_message.py "$MSG" || true
          echo "🎞 Encoding HEVC 10-bit (preset=${HEVC_PRESET}, CRF ${HEVC_CRF}) dari original..."
          echo "📦 Original: $(ls -lh "$FILE" | awk '{print $5}')"

          SRC_DUR_INT="${{ steps.inputs.outputs.duration }}"
          [ -z "$SRC_DUR_INT" ] || [ "$SRC_DUR_INT" -le 0 ] 2>/dev/null && SRC_DUR_INT=60

          CHAT_ID="$CHAT_ID" FILENAME="$FILE" TG_API_URL="$TG_API_URL" BOT_TOKEN="$BOT_TOKEN" PROGRESS_MSG_FILE=/tmp/orvella_progress_msg_id PROGRESS_STATE_FILE=/tmp/orvella_progress_state SRC_DUR_SEC="$SRC_DUR_INT" python3 scripts/progress.py start || true
          LAST_PCT=-1
          HEVC_LOG=/tmp/orvella_hevc_encode.log
          "$FFMPEG_STATIC" -hide_banner -y -i "$FILE" \
            -c:v libx265 -profile:v main10 -pix_fmt yuv420p10le \
            -crf ${HEVC_CRF} -preset ${HEVC_PRESET} -tag:v hvc1 \
            -c:a copy -progress pipe:1 "$HEVC_FILE" > "$HEVC_LOG" 2>&1 | while IFS='=' read -r k v; do
            if [ "$k" = "out_time_ms" ]; then
              ms=${v%.*}
              [ "$ms" -gt 0 ] 2>/dev/null || continue
              cur=$(( ms / 1000000 ))
              pct=$(( (cur * 100) / SRC_DUR_INT )); [ "$pct" -gt 100 ] && pct=100
              # Forward tiap perubahan %, progress.py yg akan throttle (5% / 5s)
              if [ "$pct" != "$LAST_PCT" ]; then
                LAST_PCT=$pct
                echo "🔄 HEVC encode ${pct}%"
                CHAT_ID="$CHAT_ID" FILENAME="$FILE" TG_API_URL="$TG_API_URL" BOT_TOKEN="$BOT_TOKEN" PROGRESS_MSG_FILE=/tmp/orvella_progress_msg_id PROGRESS_STATE_FILE=/tmp/orvella_progress_state SRC_DUR_SEC="$SRC_DUR_INT" python3 scripts/progress.py progress "$pct" || true
              fi
            fi
          done
          echo "🔄 HEVC encode 100%"
          CHAT_ID="$CHAT_ID" FILENAME="$FILE" TG_API_URL="$TG_API_URL" BOT_TOKEN="$BOT_TOKEN" PROGRESS_MSG_FILE=/tmp/orvella_progress_msg_id python3 scripts/progress.py done || true

          if [ -s "$HEVC_FILE" ]; then
            echo "✅ HEVC selesai: $(ls -lh "$HEVC_FILE" | awk '{print $5}')"
            echo "HEVC_FILE=$HEVC_FILE" >> $GITHUB_ENV
            echo "HEVC_SIZE=$(ls -lh "$HEVC_FILE" | awk '{print $5}')" >> $GITHUB_ENV
            HDUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            HDUR_INT=${HDUR%.*}
            [ -z "$HDUR_INT" ] && HDUR_INT=0
            echo "HEVC_DUR=$(printf '%02d:%02d:%02d' $((HDUR_INT/3600)) $(((HDUR_INT%3600)/60)) $((HDUR_INT%60)))" >> $GITHUB_ENV
            HW=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null|head -1)
            HH=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null|head -1)
            [ -n "$HW" ] && [ -n "$HH" ] && echo "HEVC_RES=${HW}x${HH}" >> $GITHUB_ENV
            HCV=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null|head -1)
            [ -n "$HCV" ] && echo "HEVC_VCODEC=$HCV" >> $GITHUB_ENV
            HBR=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null|head -1)
            case "$HBR" in ''|*[!0-9]*) ;; *) echo "HEVC_VBITRATE=$(awk "BEGIN{printf \"%.1f Mbps\", ${HBR}/1000000}")" >> $GITHUB_ENV ;; esac
            # === #4 VERIFIKASI AUDIO: pastikan HEVC punya stream audio ===
            # x265 cuma encode video; -c:a copy harusnya salin audio. Cek biar gak ke-drop.
            AUD=$(ffprobe -v error -select_streams a -show_entries stream=index -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            if [ -z "$AUD" ]; then
              echo "🔇 HEVC TIDAK punya audio stream — re-mux dari original..."
              TMP_REMUX="${HEVC_FILE%.mp4}.remux.mp4"
              "$FFMPEG_STATIC" -hide_banner -y -i "$HEVC_FILE" -i "$FILE" \
                -map 0:v:0 -map 1:a? -c copy "$TMP_REMUX" 2>/dev/null || true
              if [ -s "$TMP_REMUX" ]; then
                AUD2=$(ffprobe -v error -select_streams a -show_entries stream=index -of default=noprint_wrappers=1:nokey=1 "$TMP_REMUX" 2>/dev/null | head -1)
                if [ -n "$AUD2" ]; then
                  mv -f "$TMP_REMUX" "$HEVC_FILE"
                  echo "✅ Audio berhasil di-re-mux ke HEVC."
                else
                  rm -f "$TMP_REMUX"
                  echo "⚠️ Original juga gak punya audio — HEVC tanpa suara (wajar kalau sumber silent)."
                fi
              else
                rm -f "$TMP_REMUX"
                echo "⚠️ Re-mux gagal — HEVC tanpa suara."
              fi
            else
              echo "🔊 HEVC punya audio stream (#$AUD) — OK."
            fi
            HEVC_THUMB="${HEVC_FILE%.mp4}.jpg"
            HSEEK=1; [ "$HDUR_INT" -gt 6 ] && HSEEK=$((HDUR_INT/2))
            "$FFMPEG_STATIC" -hide_banner -loglevel error -y -ss "$HSEEK" -i "$HEVC_FILE" -frames:v 1 -q:v 2 -vf "scale=640:-2" "$HEVC_THUMB" 2>/dev/null || true
            [ ! -s "$HEVC_THUMB" ] && "$FFMPEG_STATIC" -hide_banner -loglevel error -y -ss 1 -i "$HEVC_FILE" -frames:v 1 -q:v 2 -vf "scale=640:-2" "$HEVC_THUMB" 2>/dev/null || true
            if [ -s "$HEVC_THUMB" ]; then echo "HEVC_THUMB_FILE=$HEVC_THUMB" >> $GITHUB_ENV; echo "HAS_HEVC_THUMB=1" >> $GITHUB_ENV; else echo "HAS_HEVC_THUMB=0" >> $GITHUB_ENV; fi
            # === #7 KALIBRASI: hitung realtime_x aktual & kirim ke worker (KV) ===
            ENC_ELAPSED=$(( SECONDS - ENC_START ))
            if [ "$HDUR_INT" -gt 0 ] && [ "$ENC_ELAPSED" -gt 0 ]; then
              ACT_RT=$(awk "BEGIN{printf \"%.4f\", $HDUR_INT / $ENC_ELAPSED}")
              echo "🎯 realtime_x aktual: ${ACT_RT}x (video ${HDUR_INT}s / encode ${ENC_ELAPSED}s)"
              # Kirim ke worker biar disimpan + di-rata-rata ke KV
              curl -fsS --retry 2 --retry-delay 3 -X POST "https://rusemeva.rusemeva.workers.dev/rtcal" \
                -H "Content-Type: application/json" \
                -d "{\"preset\":\"${HEVC_PRESET}\",\"rt\":${ACT_RT},\"secret\":\"${{ secrets.PROGRESS_SECRET || '' }}\"}" 2>/dev/null || \
                echo "⚠️ Gagal kirim kalibrasi ke worker (non-fatal)."
            fi
          else
            echo "⚠️ Encode HEVC gagal."
            # === #5 ERROR CLASSIFICATION: deteksi penyebab gagal biar notif jujur ===
            # Cek log encode untuk kata kunci umum
            REASON="unknown"
            if grep -qiE "No space left on device|disk full|ENOSPC" "$HEVC_LOG" 2>/dev/null; then
              REASON="disk_full"
            elif grep -qiE "Codec .* not found|Unknown encoder|libx265|Unable to find a suitable output|Invalid data found|moov atom not found" "$HEVC_LOG" 2>/dev/null; then
              REASON="codec_or_corrupt"
            elif grep -qiE "Timeout|timed out|killed|Signal 9|SIGKILL" "$HEVC_LOG" 2>/dev/null; then
              REASON="timeout_or_killed"
            elif grep -qiE "Conversion failed|Error .* frames|Denominator" "$HEVC_LOG" 2>/dev/null; then
              REASON="ffmpeg_error"
            fi
            echo "FAIL_REASON=$REASON" >> $GITHUB_ENV
            echo "🔍 FAIL_REASON=$REASON"
          fi

      # === #1 SPLIT UPLOAD >2GB: pecah HEVC jadi part <2GB (limit Bot API) ===
      # Pakai split -b (bukan ffmpeg) biar gak re-encode. Kirim tiap part via notify.
      - name: Split HEVC kalau >2GB (biar bisa dikirim Telegram)
        if: always()
        continue-on-error: true
        run: |
          if [ -n "$HEVC_FILE" ] && [ -s "$HEVC_FILE" ]; then
            SIZE=$(stat -c%s "$HEVC_FILE" 2>/dev/null || echo 0)
            MAX=$((2*1024*1024*1024))
            if [ "$SIZE" -gt "$MAX" ]; then
              echo "📦 HEVC $((SIZE/1024/1024/1024)) GB > 2GB -> split -b 1990M"
              # Format part-000 (sama kayak record.yml yg terbukti jalan)
              split -b 1990M --numeric-suffixes=0 --suffix-length=3 "$HEVC_FILE" "${HEVC_FILE}.part-"
              # Hapus file asli biar notify gak kirim utuh
              rm -f "$HEVC_FILE"
              echo "HEVC_SPLIT=1" >> $GITHUB_ENV
              ls -lh "${HEVC_FILE}.part"* 2>/dev/null || true
            else
              echo "HEVC_SPLIT=0" >> $GITHUB_ENV
            fi
          else
            echo "HEVC_SPLIT=0" >> $GITHUB_ENV
          fi

      - name: Notify Telegram — HEVC 10-bit (encode selesai)
        if: always()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id }}
          FILENAME: ${{ steps.inputs.outputs.filename }}
          HUMAN_DUR: ${{ steps.inputs.outputs.human_duration }}
          JOB_STATUS: ${{ job.status }}
          HEVC_FILE: ${{ env.HEVC_FILE }}
          HEVC_SIZE: ${{ env.HEVC_SIZE }}
          HEVC_RES: ${{ env.HEVC_RES }}
          HEVC_VCODEC: ${{ env.HEVC_VCODEC }}
          HEVC_VBITRATE: ${{ env.HEVC_VBITRATE }}
          HEVC_DUR: ${{ env.HEVC_DUR }}
          HEVC_THUMB_FILE: ${{ env.HEVC_THUMB_FILE }}
          HAS_HEVC_THUMB: ${{ env.HAS_HEVC_THUMB }}
          TG_API_URL: ${{ secrets.TG_API_URL || 'http://localhost:8081' }}
          ORV_ID: ${{ steps.inputs.outputs.orv_id || '' }}
          HEVC_SPLIT: ${{ env.HEVC_SPLIT || '0' }}
          FAIL_REASON: ${{ env.FAIL_REASON || 'unknown' }}
          PHASE: hevc
        run: python3 scripts/notify.py

      - name: Hapus GitHub Release sementara (cleanup storage) — HANYA kalau encode sukses
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.inputs.outputs.release_tag }}"
          [ -z "$TAG" ] && exit 0
          echo "🧹 Menghapus release temp: $TAG"
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true

      - name: Hapus GitHub Release sementara kalau GAGAL (anti numpuk)
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.inputs.outputs.release_tag }}"
          [ -z "$TAG" ] && exit 0
          echo "🧹 Encode gagal -> hapus release temp biar gak numpuk: $TAG"
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          # (kalau cancelled: sengaja TIDAK dihapus di sini, biar user bisa retry manual)

      # === #FIX: selalu bersihkan temp release, TERMASUK kalau cancelled ===
      # Sebelumnya cancelled run gak kehapus (step di atas cuma failure/success),
      # sehingga temp release numpuk jadi ratusan part. Step ini idempoten.
      - name: Hapus release temp (selalu, incl. cancelled) — anti numpuk
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.inputs.outputs.release_tag }}"
          [ -z "$TAG" ] && exit 0
          echo "🧹 Pastikan release temp dibersihkan (always): $TAG"
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true

      # === #3 AUTO-RETRY: kalau encode gagal, redispatch 1 level lebih cepat ===
      # Level: medium > faster > fast > veryfast(tetap) ; stop setelah veryfast.
      # Release temp SUDAH dihapus di atas biar gak numpuk; dispatch baru bikin release baru.
      - name: Auto-retry encode 1 level lebih cepat (kalau gagal)
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ORV_ID: ${{ steps.inputs.outputs.orv_id || '' }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id || '' }}
          FILENAME: ${{ steps.inputs.outputs.filename || '' }}
          SRC_URL: ${{ steps.inputs.outputs.m3u8_url || '' }}
          REFERRER: ${{ steps.inputs.outputs.referer || '' }}
          CUR_PRESET: ${{ steps.inputs.outputs.hevc_preset || 'veryfast' }}
          CUR_CRF: ${{ steps.inputs.outputs.hevc_crf || '24' }}
        run: |
          # Tentukan preset turun 1 level
          case "$CUR_PRESET" in
            medium)   NEXT_PRESET=faster;  NEXT_CRF=22 ;;
            faster)   NEXT_PRESET=fast;    NEXT_CRF=23 ;;
            fast)     NEXT_PRESET=veryfast; NEXT_CRF=24 ;;
            *)        echo "ℹ️ Sudah veryfast, tidak auto-retry lagi (stop di veryfast)."; exit 0 ;;
          esac
          echo "🔁 Auto-retry: $CUR_PRESET -> $NEXT_PRESET (crf $NEXT_CRF)"
          # Update KV meta (buat /status)
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type=encode-request \
            -f "client_payload[filename]=$FILENAME" \
            -f "client_payload[chat_id]=$CHAT_ID" \
            -f "client_payload[m3u8_url]=$SRC_URL" \
            -f "client_payload[referer]=$REFERRER" \
            -f "client_payload[hevc_preset]=$NEXT_PRESET" \
            -f "client_payload[hevc_crf]=$NEXT_CRF" \
            -f "client_payload[orv_id]=$ORV_ID" \
            -f "client_payload[auto_retry]=1" || true
          echo "✅ Auto-retry dispatched ($NEXT_PRESET)."

      - name: Bersihkan disk runner
        if: always()
        continue-on-error: true
        run: |
          rm -rf /tmp/orvella_dl 2>/dev/null || true
          docker rm -f tg-bot-api >/dev/null 2>&1 || true
          echo "✅ Disk runner dibersihkan"
